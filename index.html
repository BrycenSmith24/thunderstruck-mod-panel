<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff Login | Thunderstruck</title>
  </head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Staff Login</h1>
      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" type="text" required>
        <label for="password">Password</label>
        <input id="password" type="password" required>
        <button type="submit" id="submitBtn">Login</button>
      </form>
      <div id="msg" style="margin-top:12px; text-align:center;"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://roblox-ban-bridge.your-worker-domain.workers.dev/";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      
      btn.disabled = true;
      msg.textContent = "Authenticating...";

      try {
        const response = await fetch(`${WORKER_URL}/auth`, {
          method: 'POST',
          body: JSON.stringify({
            user: document.getElementById('username').value,
            pass: document.getElementById('password').value
          })
        });

        if (response.ok) {
          window.location.href = "dashboard.html";
        } else {
          msg.style.color = "#ff4747";
          msg.textContent = "Invalid credentials.";
        }
      } catch (err) {
        msg.textContent = "Connection error.";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
