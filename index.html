<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Thunderstruck Mod Panel</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #111;
      border: 1px solid #fff;
      border-radius: 8px;
      padding: 30px;
      width: 320px;
      box-shadow: 0 0 10px #fff;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #fff;
      border-radius: 4px;
      background-color: #000;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Staff Login</h2>
    <form id="login-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
