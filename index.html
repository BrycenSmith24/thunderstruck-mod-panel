<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff Login | Thunderstruck</title>
  <style>
    body{background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{width:340px;padding:28px;background:#111;border:1px solid #fff;border-radius:10px;box-shadow:0 6px 18px rgba(255,255,255,0.03)}
    h2{text-align:center;margin:0 0 18px 0}
    input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #fff;background:#000;color:#fff}
    button{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none;background:#fff;color:#000;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <h2>Staff Login</h2>
    <form id="login" onsubmit="event.preventDefault(); login()">
      <input id="user" type="text" placeholder="Username" required />
      <input id="pass" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    // Simple demo login: replace with real auth later.
    function login(){
      const u = document.getElementById('user').value.trim();
      const p = document.getElementById('pass').value.trim();
      // In production: call your auth endpoint and get a session token.
      if(!u || !p){ alert('Enter credentials'); return; }
      // For now, store a demo token and redirect
      localStorage.setItem('staff_token','demo-token');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
