<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thunderstruck Dashboard</title>
  <style>
    :root{
      --bg:#000;
      --panel:#111;
      --accent:#fff;
      --muted:#222;
      --radius:12px;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--accent);font-family:Inter,Arial,Helvetica,sans-serif}
    .app{display:flex;height:100vh;overflow:hidden}

    /* Sidebar */
    .sidebar{
      width:240px;background:var(--panel);border-right:1px solid var(--accent);padding:28px 18px;box-sizing:border-box;display:flex;flex-direction:column;
    }
    .brand{font-weight:800;text-align:center;font-size:18px;margin-bottom:12px}
    .nav-btn{background:transparent;color:var(--accent);border:1px solid var(--accent);padding:12px;border-radius:8px;cursor:pointer;font-weight:700;margin-bottom:10px}
    .nav-btn:hover{background:var(--accent);color:var(--bg)}

    /* Main */
    .main{flex:1;padding:28px;box-sizing:border-box;overflow:auto}
    .header{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .welcome{font-size:20px;font-weight:700}
    .small{font-size:13px;color:#bbb}

    /* Actions */
    .action-row{display:flex;gap:18px;margin-top:18px}
    .action-btn{flex:1;padding:18px;border-radius:12px;border:none;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(255,255,255,0.03);transition:transform .12s,opacity .12s}
    .action-btn:active{transform:translateY(1px)}
    .action-btn:hover{opacity:0.95}
    .ban-btn{background:#b30000;color:#fff}
    .kick-btn{background:#0066cc;color:#fff}
    .warn-btn{background:#ffcc00;color:#000}

    /* Card / form */
    .card{margin-top:20px;background:var(--panel);border:1px solid var(--accent);padding:18px;border-radius:var(--radius)}
    .card h2{margin:0 0 12px 0;font-size:18px}
    .row{display:flex;gap:12px}
    .col{flex:1}
    label{display:block;font-size:13px;margin-bottom:6px;color:#ddd}
    input[type="text"], select, textarea{
      width:100%;padding:10px;border-radius:8px;border:1px solid #fff;background:var(--bg);color:var(--accent);box-sizing:border-box;font-size:14px;margin-bottom:10px
    }
    textarea{min-height:90px;resize:vertical}
    .submit-row{display:flex;gap:12px;margin-top:12px}
    .submit-btn{padding:12px 18px;border-radius:10px;border:none;font-weight:800;cursor:pointer}
    .submit-btn.primary{background:#fff;color:#000}
    .submit-btn.ghost{background:transparent;border:1px solid #fff;color:#fff}
    .feedback{margin-top:12px;font-size:13px;color:#bbb}

    /* Responsive */
    @media (max-width:900px){
      .sidebar{display:none}
      .action-row{flex-direction:column}
      .row{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="brand">Thunderstruck Panel</div>
      <button class="nav-btn" id="navModeration">Moderation</button>
      <button class="nav-btn" id="navSettings">Settings</button>
      <div style="flex:1"></div>
      <div style="font-size:12px;color:#bbb;text-align:center">Demo Mode — static UI</div>
    </aside>

    <main class="main" role="main">
      <div class="header">
        <div>
          <div class="welcome">Welcome, Staff Member</div>
          <div class="small">This is a static preview of the moderation UI.</div>
        </div>
        <div>
          <button class="nav-btn" onclick="location.href='index.html'">Back to Login</button>
        </div>
      </div>

      <div id="pageContent">
        <div class="card">
          <h2>Get started</h2>
          <p class="small">Open Moderation to view Ban, Kick, and Warn forms. This is a static HTML preview — actions are not sent anywhere.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Static UI only. No network calls.
    const REASONS = {
      EXP: 'Exploiting or cheating',
      TOX: 'Toxic behavior or harassment',
      SPM: 'Spamming or advertising',
      ABU: 'Abuse of staff or rules',
      SCAM: 'Scamming or phishing',
      GRIEF: 'Griefing or ruining gameplay',
      OTH: 'Other'
    };

    document.getElementById('navModeration').addEventListener('click', ()=> showPage('moderation'));
    document.getElementById('navSettings').addEventListener('click', ()=> showPage('settings'));

    function showPage(page){
      const container = document.getElementById('pageContent');
      if(page === 'moderation'){
        container.innerHTML = moderationHtml();
        attachModerationListeners();
      } else {
        container.innerHTML = settingsHtml();
      }
    }

    function moderationHtml(){
      return `
        <div class="card">
          <h2>Moderation Panel</h2>
          <div class="action-row">
            <button class="action-btn ban-btn" data-action="ban">Ban</button>
            <button class="action-btn kick-btn" data-action="kick">Kick</button>
            <button class="action-btn warn-btn" data-action="warn">Warn</button>
          </div>
          <div id="formArea"></div>
        </div>
      `;
    }

    function settingsHtml(){
      return `
        <div class="card">
          <h2>Settings</h2>
          <p class="small">Panel settings and account management (static preview).</p>
        </div>
      `;
    }

    function attachModerationListeners(){
      const area = document.getElementById('pageContent');
      area.querySelectorAll('.action-btn').forEach(btn=>{
        btn.addEventListener('click', ()=> showForm(btn.getAttribute('data-action')));
      });
      // show default form
      showForm('ban');
    }

    function showForm(type){
      const formArea = document.getElementById('formArea');
      const reasonOptions = Object.entries(REASONS).map(([code,label])=>`<option value="${code}">${label}</option>`).join('');
      const banLengthSelect = `
        <select id="length">
          <option value="1">1 hour</option>
          <option value="6">6 hours</option>
          <option value="24">24 hours</option>
          <option value="168">7 days</option>
          <option value="720">30 days</option>
          <option value="perm">Permanent</option>
        </select>
      `;

      formArea.innerHTML = `
        <div class="card">
          <h2>${capitalize(type)} User</h2>

          <div class="row">
            <div class="col">
              <label for="username">Roblox Username</label>
              <input type="text" id="username" placeholder="Type username (auto-fill disabled in static preview)" autocomplete="off" />
            </div>
            <div class="col">
              <label for="userid">Roblox ID</label>
              <input type="text" id="userid" placeholder="Auto-fill disabled" readonly />
            </div>
          </div>

          <div class="row" style="margin-top:12px">
            <div class="col">
              <label for="reason">Reason</label>
              <select id="reason">${reasonOptions}</select>
            </div>
            <div class="col">
              <label for="extra">Extra (optional)</label>
              <input type="text" id="extra" placeholder="e.g., exploit name, evidence id" />
            </div>
          </div>

          <div style="margin-top:12px">
            <label for="comments">Comments</label>
            <textarea id="comments" placeholder="Add context for logs and appeals"></textarea>
          </div>

          ${type === 'ban' ? `<div style="margin-top:12px"><label for="length">Ban Length</label>${banLengthSelect}</div>` : ''}

          <div class="submit-row">
            <button class="submit-btn primary" id="submitAction">${capitalize(type)}</button>
            <button class="submit-btn ghost" id="clearForm">Clear</button>
          </div>

          <div id="feedback" class="feedback">Static preview — actions are not sent.</div>
        </div>
      `;

      document.getElementById('submitAction').addEventListener('click', ()=> {
        const fb = document.getElementById('feedback');
        fb.textContent = `Demo: ${capitalize(type)} action simulated (no network).`;
        fb.style.color = '#ffcc00';
      });

      document.getElementById('clearForm').addEventListener('click', ()=> {
        const inputs = formArea.querySelectorAll('input,textarea,select');
        inputs.forEach(i=> i.value = '');
        const fb = document.getElementById('feedback');
        fb.textContent = 'Form cleared.';
        fb.style.color = '#bbb';
      });
    }

    function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

    // Initialize to moderation view on load
    showPage('moderation');
  </script>
</body>
</html>
