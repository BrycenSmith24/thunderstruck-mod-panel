<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thunderstruck Dashboard</title>
  <style>
    :root {
      --bg: #000;
      --panel: #0a0a0a;
      --accent: #fff;
      --muted: #161616;
      --border: #222;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--accent);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 250px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 28px 18px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-weight: 800;
      text-align: center;
      font-size: 18px;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .nav-btn {
      background: transparent;
      color: #888;
      border: 1px solid transparent;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 10px;
      text-align: left;
      transition: all 0.2s;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--accent);
      background: var(--muted);
      border-color: var(--border);
    }

    .main {
      flex: 1;
      padding: 32px;
      box-sizing: border-box;
      overflow: auto;
      background: #030303;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    .welcome {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: #aaa;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .logout-btn:hover {
      background: var(--error);
      color: #fff;
      border-color: #ff4747;
    }

    .action-row {
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
    }

    .action-tab {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--panel);
      color: #666;
      transition: all 0.2s;
      text-align: center;
    }

    .action-tab[data-action="ban"].active { background: #b30000; color: #fff; border-color: #ff3333; }
    .action-tab[data-action="kick"].active { background: #0066cc; color: #fff; border-color: #3399ff; }
    .action-tab[data-action="warn"].active { background: #ffcc00; color: #000; border-color: #ffee55; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius);
    }

    .card h2 {
      margin: 0 0 18px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .col { flex: 1; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #888;
      text-transform: uppercase;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #111;
      color: var(--accent);
      box-sizing: border-box;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #555;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .submit-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      align-items: center;
    }

    .submit-btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .submit-btn.primary { background: #fff; color: #000; }
    .submit-btn.primary:disabled { background: var(--border); color: #555; cursor: not-allowed; }
    .submit-btn.ghost { background: transparent; border: 1px solid var(--border); color: #aaa; }
    .submit-btn.ghost:hover { background: #111; color: #fff; }

    .feedback {
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .action-row { flex-direction: column; }
      .row { flex-direction: column; gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="brand">Thunderstruck Panel</div>
      <button class="nav-btn active" id="navModeration">Moderation Console</button>
      <button class="nav-btn" id="navSettings">Global Settings</button>
      <div style="flex:1"></div>
      <div style="font-size:11px;color:#444;text-align:center;font-weight:600;letter-spacing:0.5px">LIVE MODE — OPEN CLOUD</div>
    </aside>

    <main class="main" role="main">
      <div class="header">
        <div>
          <div class="welcome" id="headerTitle">Moderation Console</div>
          <div class="small" id="headerSubtitle">Live active connection via serverless worker bridge.</div>
        </div>
        <div>
          <button class="logout-btn" onclick="location.href='index.html'">Log Out</button>
        </div>
      </div>

      <div id="pageContent">
         </div>
    </main>
  </div>

  <script>
    const WORKER_URL = "https://roblox-ban-bridge.brycensmithobxlover25.workers.dev";
    let currentAction = 'ban';

    const REASONS = {
      EXP: 'Exploiting or cheating',
      TOX: 'Toxic behavior or harassment',
      SPM: 'Spamming or advertising',
      ABU: 'Abuse of staff or rules',
      SCAM: 'Scamming or phishing',
      GRIEF: 'Griefing or ruining gameplay',
      OTH: 'Other'
    };

    document.getElementById('navModeration').addEventListener('click', (e) => {
      switchTab(e.target, 'moderation');
    });
    document.getElementById('navSettings').addEventListener('click', (e) => {
      switchTab(e.target, 'settings');
    });

    function switchTab(element, page) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      element.classList.add('active');
      showPage(page);
    }

    function showPage(page) {
      const container = document.getElementById('pageContent');
      const title = document.getElementById('headerTitle');
      
      if (page === 'moderation') {
        title.textContent = "Moderation Console";
        container.innerHTML = `
          <div class="action-row">
            <div class="action-tab active" data-action="ban">Ban User</div>
            <div class="action-tab" data-action="kick">Kick User</div>
            <div class="action-tab" data-action="warn">Warn User</div>
          </div>
          <div id="formArea"></div>
        `;
        attachModerationListeners();
      } else {
        title.textContent = "Global Settings";
        container.innerHTML = `
          <div class="card">
            <h2>Panel Configurations</h2>
            <p class="small">System credentials and access variables are managed upstream directly inside Cloudflare Environment variables to guarantee maximum security context.</p>
          </div>
        `;
      }
    }

    function attachModerationListeners() {
      const tabs = document.querySelectorAll('.action-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentAction = tab.getAttribute('data-action');
          renderForm(currentAction);
        });
      });
      renderForm('ban'); // Default view
    }

    function renderForm(type) {
      const formArea = document.getElementById('formArea');
      const reasonOptions = Object.entries(REASONS)
        .map(([_, label]) => `<option value="${label}">${label}</option>`)
        .join('');

      const banLengthSelect = `
        <div class="col" id="durationCol">
          <label for="length">Ban Duration</label>
          <select id="length">
            <option value="3600s">1 hour</option>
            <option value="21600s">6 hours</option>
            <option value="86400s">24 hours</option>
            <option value="604800s">7 days</option>
            <option value="2592000s">30 days</option>
            <option value="permanent">Permanent</option>
          </select>
        </div>
      `;

      formArea.innerHTML = `
        <div class="card">
          <h2>Execute Target ${capitalize(type)}</h2>

          <div class="row">
            <div class="col">
              <label for="username">Roblox Username (Optional)</label>
              <input type="text" id="username" placeholder="Target Username" autocomplete="off" />
            </div>
            <div class="col">
              <label for="userid">Roblox Target UserID (Required)</label>
              <input type="text" id="userid" placeholder="e.g., 4839201" />
            </div>
          </div>

          <div class="row">
            <div class="col">
              <label for="reason">Primary Infraction Reason</label>
              <select id="reason">${reasonOptions}</select>
            </div>
            <div class="col">
              <label for="extra">Additional Context Data</label>
              <input type="text" id="extra" placeholder="e.g., specific exploit tool, logs URL" />
            </div>
          </div>

          <div style="margin-bottom: 20px;">
            <label for="comments">Internal Staff Record Logs</label>
            <textarea id="comments" placeholder="Detailed compliance summary notes or internal telemetry details..."></textarea>
          </div>

          <div class="row">
            ${type === 'ban' ? banLengthSelect : ''}
          </div>

          <div class="submit-row">
            <button class="submit-btn primary" id="submitAction">Execute Command</button>
            <button class="submit-btn ghost" id="clearForm">Clear Fields</button>
            <div id="feedback" class="feedback">Awaiting network command...</div>
          </div>
        </div>
      `;

      // Event binding
      document.getElementById('clearForm').addEventListener('click', () => {
        document.querySelectorAll('#formArea input, #formArea textarea').forEach(i => i.value = '');
        document.getElementById('feedback').textContent = "Form inputs wiped.";
        document.getElementById('feedback').style.color = "#888";
      });

      document.getElementById('submitAction').addEventListener('click', async () => {
        const fb = document.getElementById('feedback');
        const submitBtn = document.getElementById('submitAction');
        const userId = document.getElementById('userid').value.trim();

        if (!userId || isNaN(userId)) {
          fb.textContent = 'Error: A valid numeric Roblox UserID is required.';
          fb.style.color = '#ff4747';
          return;
        }

        submitBtn.disabled = true;
        fb.textContent = 'Transmitting execution payload to secure bridge...';
        fb.style.color = '#ffcc00';

        const dropdownReason = document.getElementById('reason').value;
        const extraReason = document.getElementById('extra').value.trim();
        const displayReasonString = extraReason ? `${dropdownReason} | ${extraReason}` : dropdownReason;

        const payload = {
          action: type,
          userId: userId,
          displayReason: displayReasonString,
          privateReason: document.getElementById('comments').value.trim() || 'Issued via Web Control Terminal.',
          duration: type === 'ban' ? document.getElementById('length').value : null
        };

        try {
          const response = await fetch(`${WORKER_URL}/moderation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            fb.textContent = `Success! Execution payload for UserID ${userId} deployed.`;
            fb.style.color = '#00ff66';
          } else {
            const errData = await response.json().catch(() => ({}));
            fb.textContent = `Execution Rejected (Status ${response.status}): ${errData.error || 'Server error'}`;
            fb.style.color = '#ff4747';
          }
        } catch (err) {
          fb.textContent = 'Network Timeout: Secure endpoint bridge could not be contacted.';
          fb.style.color = '#ff4747';
        } finally {
          submitBtn.disabled = false;
        }
      });
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // Init initialization layout sequence
    showPage('moderation');
  </script>
</body>
</html>
