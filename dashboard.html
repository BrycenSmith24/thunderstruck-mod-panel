<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thunderstruck Dashboard</title>
  <style>
    /* ... Keep your existing CSS ... */
    /* Add a loading state style */
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- ... (Rest of your HTML structure remains the same) ... -->
  
  <script>
    const WORKER_URL = "https://roblox-ban-bridge.your-worker-domain.workers.dev/";

    // ... (Keep your REASONS object and showPage functions) ...

    // Updated Submit Logic (No API Key sent)
    document.getElementById('submitAction').addEventListener('click', async (e) => {
      const btn = e.target;
      const fb = document.getElementById('feedback');
      const userId = document.getElementById('userid').value.trim();
      const action = document.querySelector('.action-btn.active')?.dataset.action || 'ban';

      if (!userId) {
        fb.textContent = 'Error: UserID required.';
        return;
      }

      btn.disabled = true;
      fb.textContent = 'Sending request to server...';

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: action, // Send the action type (ban/kick/warn)
            userId: userId,
            reason: document.getElementById('reason').value,
            extra: document.getElementById('extra').value,
            comments: document.getElementById('comments').value,
            duration: document.getElementById('length')?.value || '0'
          })
        });

        const data = await response.json();
        fb.textContent = response.ok ? 'Success: Action processed.' : `Error: ${data.error}`;
      } catch (err) {
        fb.textContent = 'Network error.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
