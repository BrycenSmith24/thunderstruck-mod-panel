<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thunderstruck Dashboard</title>
<style>
  /* Action buttons */
  .action-buttons {
    margin: 20px 0;
    display: flex;
    gap: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 20px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
  }

  .action-btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }

  .ban-btn {
    background-color: #b30000;
    color: #fff;
  }

  .kick-btn {
    background-color: #0066cc;
    color: #fff;
  }

  .warn-btn {
    background-color: #ffcc00;
    color: #000;
  }
</style>

<script>
  function showPage(page) {
    const content = document.getElementById('content');
    if (page === 'moderation') {
      content.innerHTML = `
        <h1>Moderation Panel</h1>
        <div class="action-buttons">
          <button class="action-btn ban-btn" onclick="showForm('ban')">Ban</button>
          <button class="action-btn kick-btn" onclick="showForm('kick')">Kick</button>
          <button class="action-btn warn-btn" onclick="showForm('warn')">Warn</button>
        </div>
        <div id="form-area"></div>
      `;
    } else if (page === 'settings') {
      content.innerHTML = '<h1>Settings</h1><p>Adjust your account and panel preferences here.</p>';
    }
  }

  function showForm(type) {
    const formArea = document.getElementById('form-area');
    const reasons = [
      { code: 'EXP', label: 'Exploiting / Cheating' },
      { code: 'TOX', label: 'Toxic Behavior / Harassment' },
      { code: 'SPM', label: 'Spamming / Advertising' },
      { code: 'ABU', label: 'Abuse of Staff / Rules' },
      { code: 'OTH', label: 'Other (Specify Below)' }
    ];

    let reasonOptions = reasons.map(r => `<option value="${r.code}">${r.label}</option>`).join('');

    let title = type.charAt(0).toUpperCase() + type.slice(1);
    formArea.innerHTML = `
      <div class="form-section">
        <h2>${title} User</h2>
        <input type="text" id="username" placeholder="Roblox Username" required>
        <input type="text" id="userid" placeholder="Roblox ID (auto-filled)" readonly>
        <select id="reason">${reasonOptions}</select>
        <textarea id="comments" placeholder="Additional comments"></textarea>
        ${type === 'ban' ? '<input type="text" id="length" placeholder="Ban Length (hours)">' : ''}
        <button class="action">${title}</button>
      </div>
    `;
  }
</script>

</body>
</html>
